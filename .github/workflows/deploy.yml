name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Oracle Cloud
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          ORACLE_COMPARTMENT_ID: ${{ secrets.ORACLE_COMPARTMENT_ID }}
          ORACLE_CONTAINER_INSTANCE_ID: ${{ secrets.ORACLE_CONTAINER_INSTANCE_ID }}
          ORACLE_AUTH_TOKEN: ${{ secrets.ORACLE_AUTH_TOKEN }}
          ORACLE_REGION: ${{ secrets.ORACLE_REGION }}
        run: |
          # Install OCI CLI
          curl -L -O https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh
          chmod +x install.sh
          ./install.sh --accept-all-defaults
          
          # Configure OCI CLI
          mkdir -p ~/.oci
          echo "${{ secrets.ORACLE_CONFIG }}" > ~/.oci/config
          echo "${{ secrets.ORACLE_PRIVATE_KEY }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/config ~/.oci/key.pem
          
          # Update container instance with new image
          oci compute-container-instance container-instance update \
            --container-instance-id "$ORACLE_CONTAINER_INSTANCE_ID" \
            --containers '[{"imageUrl":"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"}]' \
            --region "$ORACLE_REGION" \
            || echo "Note: Manual deployment may be required for first-time setup"

      - name: Deployment Summary
        run: |
          echo "✅ Docker image built and pushed to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "📦 Image tags: ${{ steps.meta.outputs.tags }}"
          echo "🚀 Deployment to Oracle Cloud initiated"
          echo "⏱️  Check Oracle Cloud console for deployment status"
